<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鳳山據點辦理備忘錄</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; color: #333; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: #f9f9f9; }
        h2 { color: #007bff; margin-top: 0; }
        ul { padding-left: 20px; }
        .btn { 
            display: block; width: 100%; padding: 15px; margin-top: 20px;
            background: #00B900; color: white; text-align: center;
            text-decoration: none; border-radius: 5px; font-weight: bold; border: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>高雄市北區輔具資源中心<br>鳳山據點</h2>
        <p><strong>地址：</strong>高雄市鳳山區光復路二段120號1樓 (定位用)</p>
        <p style="color: red;"><strong>實際位置：請至同址 3 樓</strong></p>
        <hr>
        <p><strong>請準備以下文件：</strong></p>
        <ul>
            <li>公文 / 身分證 / 聽障證明</li>
            <li>印章 (簡易章亦可)</li>
            <li>助聽器 / 調整報告 / 保固書 / 發票</li>
        </ul>
    </div>

    <button class="btn" onclick="sendShare()">將備忘傳送到我的LINE</button>

    <script>
        async function main() {
            await liff.init({ liffId: "你的LIFF_ID" }); // 需在 LINE Developers 申請
        }
        main();

        async function sendShare() {
            if (liff.isApiAvailable('shareTargetPicker')) {
                await liff.shareTargetPicker([
                    {
                        "type": "text",
                        "text": "【鳳山據點辦理備忘】\n地址：鳳山區光復路二段120號3樓\n攜帶：公文、印章、身分證、聽障證明、助聽器、調整報告、保固書、發票。"
                    }
                ]);
            }
        }
    </script>
</body>
</html>
