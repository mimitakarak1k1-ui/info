<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鳳山據點數位備忘錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 400px;
            width: 95%; /* 使用 95% 確保在極小螢幕左右仍有呼吸空間 */
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box; /* 核心修正：防止 Padding 撐開寬度 */
            margin: 20px auto; /* 置中並增加上下間距 */
        }
        h1 {
            font-size: 1.4rem;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }
        /* 服務人員標籤樣式 */
        #staff-container {
            display: none; /* 預設隱藏，有參數才顯示 */
            text-align: center;
            margin-bottom: 20px;
        }
        .staff-tag {
            background-color: #e8f4fd;
            color: #2980b9;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid #d0e4f5;
            display: inline-block;
        }
        .info-box {
            background: #fff9db;
            padding: 15px;
            border-left: 5px solid #fcc419;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .btn {
            display: block;
            width: 100%; /* 會填滿底板內部空間 */
            box-sizing: border-box; /* 確保按鈕也不會超出 */
            padding: 15px;
            margin: 10px 0;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-map { background-color: #4285f4; color: white; }
        .btn-line { background-color: #06c755; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="header-title">高雄市北區輔具資源中心<br>鳳山據點</h1>

    <div id="staff-container">
        <span class="staff-tag">👤 專屬服務：<span id="staff-name"></span></span>
    </div>

    <div class="info-box">
        📍 <b>據點地址：</b>高雄市鳳山區光復路二段120號<br>
        🏢 <b>樓層提醒：</b>請務必至 <b>3 樓</b> 辦理
    </div>

    <div style="margin-bottom: 20px;">
        <b>📋 攜帶文件清單：</b>
        <ul style="padding-left: 20px; color: #444;">
            <li>公文、印章、身分證</li>
            <li>聽障證明、調整報告</li>
            <li>保固書、發票、助聽器</li>
        </ul>
    </div>

    <a href="https://www.google.com/maps/search/?api=1&query=高雄市鳳山區光復路二段120號3樓" class="btn btn-map">🗺️ 開啟地圖導航</a>
    
    <a href="javascript:void(0);" onclick="shareToLine()" class="btn btn-line">分享資訊到我的 LINE</a>
</div>

<script>
    // 1. 取得網址參數中的服務人員姓名
    const urlParams = new URLSearchParams(window.location.search);
    const staff = urlParams.get('staff'); 

    // 2. 如果有設定 staff 參數，則顯示標籤並更新內容
    if (staff) {
        const decodedStaff = decodeURIComponent(staff);
        document.getElementById('staff-container').style.display = 'block';
        document.getElementById('staff-name').innerText = decodedStaff;
    }

    // 3. 整合後的 LINE 分享邏輯
    function shareToLine() {
        const currentUrl = window.location.href;
        
        // 判斷是否顯示服務人員資訊
        const staffHeader = staff ? `【${decodeURIComponent(staff)} 竭誠為您服務】\n` : "";
        
        // 組合您喜歡的備忘錄訊息格式
        const message = 
            staffHeader +
            "【鳳山據點辦理備忘】\n" +
            "📍 實際地點：鳳山區光復路二段120號3樓\n" +
            "📦 應備文件：公文、印章、身分證、聽障證明、助聽器、調整報告、保固書、發票。\n\n" +
            "🔗 詳細資訊與導航請點此：\n" +
            currentUrl;

        // 使用 LINE URL Scheme 進行分享
        const lineUrl = `https://line.me/R/share?text=${encodeURIComponent(message)}`;
        window.location.href = lineUrl;
    }
</script>

</body>
</html>
